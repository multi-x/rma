    .lock-card button { width: 100%; padding: 10px; background: rgba(0,207,255,.15); border: 1px solid rgba(0,207,255,.4); border-radius: 8px; color: #00cfff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Outfit', sans-serif; }

  // Warehouse, commission, tariff (USA only)
  let wh_total = 0, commission = 0, tariff_val = 0, total_ae = 0;
  if (isUSA) {
    const whKey = `${condicion}|${warehouse}|${despacho}`;
    wh_total = overrideWh !== null ? overrideWh : ((D.wh[whKey] && warehouse) ? D.wh[whKey].total : 0);
    commission = (spNum - wh_total) * COMM_RATE;
    const tariff_base = TARIFF_PCT > 0 ? ((spNum - wh_total) * (1 - COMM_RATE) / 0.4536 - (freight || 0)) * TARIFF_PCT * 0.4536 / (1 + TARIFF_PCT) : 0;
    tariff_val = Math.max(0, tariff_base);
    total_ae = wh_total + commission + tariff_val;
  }

  // RMP
  const rmp = gfob != null && freight != null
    ? (sp_kg - (isUSA ? total_ae / 0.4536 : 0) - freight - gfob) * yield_
    : null;

  // FOB Price & Firm Price
  const fob_price = rmp != null ? rmp / yield_ + gfob : null;
  const firm_price = isUSA ? spNum - wh_total - commission - tariff_val : spNum;
  const retorno = rmp != null ? rmp / yield_ : null;

  // TDE
  let tde = null;
  if (rmp != null) {
    const tdeRef = D.tde_base[region];
    if (tdeRef) {
      const { yield_: ty, gfob: tg, freight: tf, wh: twh, comm_rate: tcr, tariff_pct: ttp } = tdeRef;
      const bg = rmp / ty + tg;
      const bh = (bg * (1 + ttp) + tf) * 0.4536;
      const bi = twh;
      const bj = bh / (1 - tcr) * tcr;
      const bk = bg * ttp * 0.4536;
      tde = (rmp / ty + tg + tf) * 0.4536 + bi + bj + bk;
    }
  }

  return {
    yield_, yield_base, giveaway, cv, ce, cf, cf_wfe, frig, exp, gfob,
    fleteUnit: effectiveFleteUnit, tara, freight,
    mercado, isUSA,
    sp_kg, wh_total, commission, tariff_val, total_ae,
    rmp, tde, fob_price, firm_price, retorno, retorno_neto: retorno,
    famPack, ceKey, prodKey, fleteKey,
  };
}

// Input con estado local — definido FUERA de App para que React no lo desmonte en cada render
function LocalInput({ externalValue, onCommit, placeholder, inputStyle: iStyle }) {
  const [val, setVal] = React.useState(externalValue || "");
  React.useEffect(() => { setVal(externalValue || ""); }, [externalValue]);
  return (
    <input
      type="text" inputMode="decimal"
      value={val}
      onChange={e => setVal(e.target.value)}
      onBlur={e => onCommit(e.target.value)}
      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
      placeholder={placeholder}
      style={iStyle}
    />
  );
}

function GastosUSARow({ calc, s, fmt, ResultRow }) {
  const [open, setOpen] = React.useState(false);
  return <>

      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, fontWeight: 700, color: s.red }}>− {fmt(calc.total_ae / 0.4536, 5)}</span>
    </div>
    {open && <>
      <ResultRow label="  · WH Cost"       value={`− ${fmt(calc.wh_total   / 0.4536, 5)}`} color={s.red} />
      <ResultRow label="  · Commission 2%" value={`− ${fmt(calc.commission / 0.4536, 5)}`} color={s.red} />
      <ResultRow label="  · Tariff 10%"    value={`− ${fmt(calc.tariff_val / 0.4536, 5)}`} color={s.red} />

}

                  <button onClick={() => setFleteManual(f => ({
                    active: !f.active,
                    value: !f.active ? (calcBase?.fleteUnit != null ? fmt(calcBase.fleteUnit, 2) : "") : ""
                  }))} style={{
                    fontSize: 9, padding: "2px 7px", marginLeft: 6,
                    background: fleteManual.active ? "rgba(245,158,11,.2)" : "rgba(0,207,255,.1)",
                    border: `1px solid ${fleteManual.active ? "rgba(245,158,11,.5)" : "rgba(0,207,255,.3)"}`,
                    borderRadius: 5, color: fleteManual.active ? "#f59e0b" : "#00cfff",
                    cursor: "pointer", fontWeight: 600, fontFamily: "inherit",
                    letterSpacing: "0.5px", textTransform: "uppercase"
                  }}>
                    {fleteManual.active ? "✕ Auto" : "✎ Ajustar"}
                  </button>
                )}
              </div>
            }>
              {fleteManual.active && form.condicion === "Fresh" ? (
                <div>
                  <LocalInput
                    externalValue={fleteManual.value}
                    onCommit={v => setFleteManual(f => ({ ...f, value: v }))}
                    placeholder={calcBase?.fleteUnit != null ? fmt(calcBase.fleteUnit, 2) : "0.00"}
                    inputStyle={{ ...inputStyle, borderColor: "rgba(245,158,11,.5)", color: "#f59e0b", width: "100%" }}
                  />
                  <div style={{ fontSize: 9, color: "rgba(245,158,11,.7)", marginTop: 3 }}>
                    ✎ Manual · Auto: {calcBase?.fleteUnit != null ? fmt(calcBase.fleteUnit, 2) : "—"} USD/kg
                  </div>
                </div>
              ) : (
                <Locked value={calc?.fleteUnit != null ? fmt(calc.fleteUnit, 2) : "—"}
                  style={fleteManual.active ? { borderColor: "rgba(245,158,11,.4)", color: "#f59e0b" } : {}} />
              )}
            </Field>
            <Field label={
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span>Tara</span>
                {form.condicion === "Fresh" && form.pack && (
                  <button onClick={() => setTaraManual(t => ({
                    active: !t.active,
                    value: !t.active ? (calcBase?.tara != null ? fmt(calcBase.tara, 4) : "") : ""
                  }))} style={{
                    fontSize: 9, padding: "2px 7px", marginLeft: 6,
                    background: taraManual.active ? "rgba(245,158,11,.2)" : "rgba(0,207,255,.1)",
                    border: `1px solid ${taraManual.active ? "rgba(245,158,11,.5)" : "rgba(0,207,255,.3)"}`,
                    borderRadius: 5, color: taraManual.active ? "#f59e0b" : "#00cfff",
                    cursor: "pointer", fontWeight: 600, fontFamily: "inherit",
                    letterSpacing: "0.5px", textTransform: "uppercase"
                  }}>
                    {taraManual.active ? "✕ Auto" : "✎ Ajustar"}
                  </button>
                )}
              </div>
            }>
              {taraManual.active && form.condicion === "Fresh" ? (
                <div>
                  <LocalInput
                    externalValue={taraManual.value}
                    onCommit={v => setTaraManual(t => ({ ...t, value: v }))}
                    placeholder={calcBase?.tara != null ? fmt(calcBase.tara, 4) : "1.2000"}
                    inputStyle={{ ...inputStyle, borderColor: "rgba(245,158,11,.5)", color: "#f59e0b", width: "100%" }}
                  />
                  <div style={{ fontSize: 9, color: "rgba(245,158,11,.7)", marginTop: 3 }}>
                    ✎ Manual · Auto: {calcBase?.tara != null ? fmt(calcBase.tara, 4) : "—"}
                  </div>
                </div>
              ) : (
                <Locked value={calc?.tara != null ? fmt(calc.tara, 4) : "—"}
                  style={taraManual.active ? { borderColor: "rgba(245,158,11,.4)", color: "#f59e0b" } : {}} />
              )}
            </Field>
            <Field label="Freight [USD/kg PT]">
              <Locked value={calc?.freight != null ? fmt(calc.freight, 5) : "—"} unit="USD/kg"
                style={fleteManual.active ? { borderColor: "rgba(245,158,11,.25)", color: "#f59e0b" } : {}} />
              {fleteManual.active && calc?.freight != null && (
                <div style={{ fontSize: 9, color: "rgba(245,158,11,.6)", marginTop: 3 }}>
                  = {fleteManual.value || "—"} × {taraManual.active && taraManual.value ? taraManual.value : (calc?.tara != null ? fmt(calc.tara, 4) : "—")}
                </div>
              )}
            </Field>
          </div>

          {/* Section 4: Costos de Producción */}
          {form.producto && (
            <div style={{ ...grid, gridTemplateColumns: "repeat(6, 1fr)", background: s.card, border: `1px solid ${s.border}`, borderRadius: 10, padding: 18, marginBottom: 12 }}>
              <SectionHead color="#f59e0b">③ Costos Producción (auto desde Parámetros)</SectionHead>
              {[
                ["Yield", calc?.yield_ ? (calc.yield_ * 100).toFixed(3) + "%" : "—"],
                ["CV", calc?.cv != null ? fmt(calc.cv) : "—"],
                ["CE", calc?.ce != null ? fmt(calc.ce) : "—"],
                ["CF/kg PT", calc?.cf != null ? fmt(calc.cf, 5) : "—"],
                ["Ex Planta", calc?.exp != null ? fmt(calc.exp, 5) : "—"],
                ["Frigorifico", calc?.frig != null ? fmt(calc.frig) : "—"],
              ].map(([l, v]) => (
                <div key={l}>
                  <Label>{l}</Label>
                  <Locked value={v} />
                </div>
              ))}
              <div style={{ gridColumn: "1 / -1", display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10, paddingTop: 6, borderTop: `1px dashed ${s.border}`, marginTop: 4 }}>
                <Field label="GFOB = CV + CE + CF + ExP + Frig">
                  <Locked value={calc?.gfob != null ? fmtC(calc.gfob, 5) : "—"} unit="USD/kg PT" />
                </Field>
                <Field label="Familia Pack (lookup key CE)">
                  <Locked value={calc?.famPack || "—"} />
                </Field>
              </div>
              {calc?.giveaway && calc.giveaway !== 1.0 && (
                <div style={{ gridColumn: "1 / -1", marginTop: 6, padding: "8px 12px", background: "rgba(245,158,11,.08)", border: "1px solid rgba(245,158,11,.25)", borderRadius: 7, display: "flex", alignItems: "center", gap: 10, fontSize: 11 }}>
                  <span style={{ color: s.gold, fontWeight: 600 }}>Giveaway aplicado</span>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", color: s.muted }}>
                    Yield {(calc.yield_base * 100).toFixed(3)}% × {(calc.giveaway * 100).toFixed(1)}%
                    <span style={{ color: "#fff", margin: "0 6px" }}>→</span>
                    <span style={{ color: s.gold }}>{(calc.yield_ * 100).toFixed(3)}%</span>
                  </span>
                </div>
              )}
            </div>
          )}

          {/* Section 5: USA Expenses (solo si destino USA) */}
          {isUSA && form.destino && (
            <div style={{ ...grid, gridTemplateColumns: "1fr 1fr 1fr", background: s.card, border: `1px solid ${s.border}`, borderRadius: 10, padding: 18, marginBottom: 12 }}>
              <SectionHead color="#ef4444">④ Gastos USA</SectionHead>
              <Field label="Warehouse USA" span={2}>
                <select value={form.warehouse} onChange={e => set("warehouse", e.target.value)} style={selStyle}>
                  <option value="">— Sin warehouse —</option>
                  {warehouses.map(w => <option key={w}>{w}</option>)}
                </select>
              </Field>
              <Field label="Comisión %">
                <Locked value="2.00%" />
              </Field>
              <Field label="Tariff %">
                <Locked value="10.00%" />
              </Field>
              <Field label={
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <span>Total WH [USD/lb]</span>
                  <button onClick={() => setWhManual(w => ({
                    active: !w.active,
                    value: !w.active ? (calcBase?.wh_total != null ? fmt(calcBase.wh_total, 4) : "") : ""
                  }))} style={{
                    fontSize: 9, padding: "2px 7px", marginLeft: 6,
                    background: whManual.active ? "rgba(245,158,11,.2)" : "rgba(0,207,255,.1)",
                    border: `1px solid ${whManual.active ? "rgba(245,158,11,.5)" : "rgba(0,207,255,.3)"}`,
                    borderRadius: 5, color: whManual.active ? "#f59e0b" : "#00cfff",
                    cursor: "pointer", fontWeight: 600, fontFamily: "inherit",
                    letterSpacing: "0.5px", textTransform: "uppercase"
                  }}>
                    {whManual.active ? "✕ Auto" : "✎ Ajustar"}
                  </button>
                </div>
              }>
                {whManual.active ? (
                  <div>
                    <LocalInput
                      externalValue={whManual.value}
                      onCommit={v => setWhManual(w => ({ ...w, value: v }))}
                      placeholder={calcBase?.wh_total != null ? fmt(calcBase.wh_total, 4) : "0.0000"}
                      inputStyle={{ ...inputStyle, borderColor: "rgba(245,158,11,.5)", color: "#f59e0b", width: "100%" }}
                    />
                    <div style={{ fontSize: 9, color: "rgba(245,158,11,.7)", marginTop: 3 }}>
                      ✎ Manual · Auto: {calcBase?.wh_total != null ? fmt(calcBase.wh_total, 4) : "—"} USD/lb
                    </div>
                  </div>
                ) : (
                  <Locked value={calc?.wh_total != null ? fmt(calc.wh_total, 4) : "—"}
                    style={whManual.active ? { borderColor: "rgba(245,158,11,.4)", color: "#f59e0b" } : {}} />
                )}
              </Field>
              <Field label="Commission [USD/lb]">
                <Locked value={calc?.commission != null ? fmt(calc.commission, 5) : "—"} />
              </Field>
              <Field label="Tariff [USD/lb]">
                <Locked value={calc?.tariff_val != null ? fmt(calc.tariff_val, 5) : "—"} />
              </Field>
              <Field label="Total Gastos USA [USD/lb]">
                <Locked value={calc?.total_ae != null ? fmt(calc.total_ae, 5) : "—"} />
              </Field>
            </div>
          )}

          {/* Section 6: Precio */}
          <div style={{ ...grid, gridTemplateColumns: "1fr 1fr 1fr", background: s.card, border: `1px solid ${s.border}`, borderRadius: 10, padding: 18 }}>
            <SectionHead color="#00cfff">⑤ Precio de Venta</SectionHead>
            <Field label={`Sales Price [USD/${isUSA ? "lb" : "kg"}]`} span={2}>
              <LocalInput
                externalValue={form.sp}
                onCommit={v => set("sp", v)}
                placeholder={`Ingrese precio en USD/${isUSA ? "lb" : "kg"}`}
                inputStyle={{ ...inputStyle, fontSize: 15, padding: "10px 12px", border: `1px solid rgba(0,207,255,.35)`, color: "#fff", fontWeight: 600, width: "100%" }}
              />
            </Field>
            <Field label="Sales Price [USD/kg PT]">
              <Locked value={calc?.sp_kg != null ? fmt(calc.sp_kg, 4) : "—"} unit="USD/kg PT" />
            </Field>
          </div>
        </div>

        {/* RIGHT: Results */}
        <div style={{ background: s.card, border: `1px solid ${s.border}`, borderRadius: 12, padding: 20, position: "sticky", top: 16, alignSelf: "start" }}>
          <div style={{ fontSize: 10, color: s.muted, textTransform: "uppercase", letterSpacing: "2px", marginBottom: 16, fontWeight: 700 }}>Resultado</div>

          {!ready ? (
            <div style={{ textAlign: "center", padding: "40px 0", color: s.muted }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>⟳</div>
              <div style={{ fontSize: 11 }}>Complete el formulario para calcular</div>
            </div>
          ) : (
            <div className="result-in">

              {/* Main results */}
              <div style={{ background: ready ? "rgba(0,207,255,.06)" : "transparent", border: `1px solid rgba(0,207,255,.18)`, borderRadius: 10, padding: 16, marginBottom: 16, textAlign: "center" }}>
                <div style={{ fontSize: 10, color: s.muted, letterSpacing: "2px", textTransform: "uppercase", marginBottom: 8 }}>RMP [USD/kg WFE]</div>
                <div style={{ fontSize: 42, fontWeight: 700, color: calc.rmp > 5 ? s.green : calc.rmp > 2 ? s.gold : s.red, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1 }}>
                  {fmt(calc.rmp, 3)}
                </div>
                <div style={{ fontSize: 10, color: s.muted, marginTop: 6 }}>USD / kg WFE</div>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                <div style={{ background: "rgba(16,185,129,.06)", border: `1px solid rgba(16,185,129,.18)`, borderRadius: 10, padding: 12, textAlign: "center" }}>
                  <div style={{ fontSize: 9, color: s.muted, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 4 }}>Trim D Eq [USD/lb]</div>
                  <div style={{ fontSize: 24, fontWeight: 700, color: s.green, fontFamily: "'JetBrains Mono', monospace" }}>
                    {fmt(calc.tde, 3)}
                  </div>
                </div>
                <div style={{ background: "rgba(245,158,11,.06)", border: `1px solid rgba(245,158,11,.18)`, borderRadius: 10, padding: 12, textAlign: "center" }}>
                  <div style={{ fontSize: 9, color: s.muted, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 4 }}>Mercado</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: s.gold, fontFamily: "inherit", marginTop: 2 }}>
                    {mercado || "—"}
                  </div>
                </div>
              </div>

              {/* Breakdown */}
              <div style={{ fontSize: 10, color: s.muted, textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 8, marginTop: 4 }}>Desglose</div>

              <ResultRow label="SP [USD/kg PT]" value={fmtC(calc.sp_kg, 4)} />
              {isUSA && <GastosUSARow calc={calc} s={s} fmt={fmt} ResultRow={ResultRow} />}
              <ResultRow label="− Freight" value={`− ${fmt(calc.freight, 5)}`} color={s.red} />
              <ResultRow label="= FOB Price [USD/kg PT]" value={fmtC(calc.fob_price, 5)} bold />
              <ResultRow label="− GFOB" value={`− ${fmt(calc.gfob, 5)}`} color={s.red} />
              <ResultRow label="= Retorno [USD/kg PT]" value={fmtC(calc.retorno, 5)} bold />
              <ResultRow label="× Yield" value={`× ${(calc.yield_ * 100).toFixed(2)}%`} />
              <ResultRow label="= RMP [USD/kg WFE]" value={fmtC(calc.rmp, 4)} color={s.accent} bold size={14} />
              <div style={{ height: 1, background: s.border, margin: "8px 0" }} />
              <ResultRow label="FOB Price [USD/kg PT]" value={fmtC(calc.fob_price, 4)} />

              {isUSA && (
                <>
                  <ResultRow label="Firm Price [USD/lb]" value={fmtC(calc.firm_price, 4)} />
                  <ResultRow label="Commission" value={fmtC(calc.commission, 4)} />
                  <ResultRow label="Tariff [USD/lb]" value={fmtC(calc.tariff_val, 5)} />
                </>
              )}

              {/* Sensitivity table ±30c */}
              {(() => {
                const spBase = parseFloat(form.sp);
                if (!spBase || !calc.rmp) return null;
                const steps = [-0.30, -0.20, -0.10, 0, +0.10, +0.20, +0.30];
                const rows = steps.map(delta => {
                  const spAdj = spBase + delta;
                  const c = calcAll({ ...form, sp: String(spAdj) });
                  return { delta, sp: spAdj, rmp: c?.rmp, tde: c?.tde };
                });
                return (
                  <div style={{ marginTop: 14 }}>
                    <div style={{ fontSize: 10, color: s.muted, textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 6 }}>
                      Sensibilidad SP ± USD 0.30
                    </div>
                    <div style={{ borderRadius: 8, overflow: "hidden", border: `1px solid ${s.border}` }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
                        <thead>
                          <tr style={{ background: "rgba(255,255,255,.04)" }}>
                            <th style={{ padding: "5px 8px", color: s.muted, fontWeight: 500, textAlign: "right", borderBottom: `1px solid ${s.border}` }}>SP</th>
                            <th style={{ padding: "5px 8px", color: s.muted, fontWeight: 500, textAlign: "right", borderBottom: `1px solid ${s.border}` }}>RMP</th>
                            <th style={{ padding: "5px 8px", color: s.muted, fontWeight: 500, textAlign: "right", borderBottom: `1px solid ${s.border}` }}>Trim D Eq</th>
                          </tr>
                        </thead>
                        <tbody>
                          {rows.map(({ delta, sp, rmp, tde }) => {
                            const isBase = delta === 0;
                            const rowBg = isBase ? "rgba(0,207,255,.07)" : "transparent";
                            const rmpColor = rmp == null ? s.muted : rmp > 5 ? s.green : rmp > 2 ? s.gold : s.red;
                            return (
                              <tr key={delta} style={{ background: rowBg, borderBottom: `1px solid rgba(255,255,255,.03)` }}>
                                <td style={{ padding: "5px 8px", textAlign: "right", color: isBase ? s.accent : s.muted }}>
                                  {isBase ? "▶ " : (delta > 0 ? "+" : "")}{delta.toFixed(2) === "0.00" ? "" : (delta > 0 ? "+" : "") + delta.toFixed(2) + " → "}
                                  <span style={{ color: isBase ? s.accent : "#fff" }}>{sp.toFixed(2)}</span>
                                </td>
                                <td style={{ padding: "5px 8px", textAlign: "right", color: rmpColor, fontWeight: isBase ? 700 : 400 }}>
                                  {rmp != null ? rmp.toFixed(3) : "—"}
                                </td>
                                <td style={{ padding: "5px 8px", textAlign: "right", color: isBase ? s.green : s.muted, fontWeight: isBase ? 700 : 400 }}>
                                  {tde != null ? tde.toFixed(3) : "—"}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })()}

              {/* Formula reminder */}
              <div style={{ marginTop: 14, padding: 10, background: "rgba(0,0,0,.2)", borderRadius: 7, fontSize: 10, fontFamily: "'JetBrains Mono', monospace", color: s.muted, lineHeight: 1.7 }}>
                N = (M − AE/0.4536 − AB − S) × R
                <br /><span style={{ color: "#3d5a7a" }}>M=SP_kg · AE=GastosUSA · AB=Freight · S=GFOB · R=Yield</span>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
