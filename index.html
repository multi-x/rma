function calcSmoked(form, overrideFleteUnit = null, cantCajas = 500, overrideWh = null, overrideTariff = null) {
  const { region, famProducto, producto, destino, despacho, warehouse, sp, cubicacion } = form;
  const despachoK = despachoKey(despacho);
  const smkKey = `${region}|${famProducto}|${producto}`;
  const prod = D.smoked[smkKey];
  if (!prod) return null;

  const condicion = "Smoked";
  const yield_ = prod.yield_ || 0;
  const cv  = prod.cv  || 0;
  const cf_wfe = prod.cf || 0;
  const cf  = yield_ > 0 ? cf_wfe / yield_ : 0;
  const ce  = prod.ce  || 0;
  const frig = prod.frig || 0;
  const exp  = prod.exp  || 0;
  const gfob = cv + ce + cf + exp + frig;

  // Freight — same logic as Fillets/Portions
  const fleteKey  = `${region}|${despachoK}|${destino}`;
  const fleteData = D.fletes[fleteKey];
  const fleteUnit = fleteData ? fleteData.flete : null;
  let effectiveFleteUnit = overrideFleteUnit ?? fleteUnit;
  let freight = null;
  if (effectiveFleteUnit != null) {
    if (despachoK === "Aéreo") {
      freight = effectiveFleteUnit;
    } else if (despachoK === "Marítimo") {
      const cub = parseFloat(cubicacion) || 14000;
      freight = effectiveFleteUnit / cub;
    } else {
      freight = effectiveFleteUnit;
    }
  }

  // SP
  const mercado = getMercadoFromDestino(destino);
  const isUSA   = mercado === "USA";
  const spNum   = parseFloat(String(sp).replace(",", "."));
  if (isNaN(spNum) || spNum <= 0) return { yield_, gfob, fleteUnit: effectiveFleteUnit, mercado, isUSA, sp_kg: null };
  const sp_kg = isUSA ? spNum / 0.4536 : spNum;

  // USA costs — use Smoked warehouse keys
  let wh_total = 0, commission = 0, tariff_val = 0, total_ae = 0, tariff_auto = 0, tariff_pct_used = 0;
  if (isUSA) {
    const whKey = `${condicion}|${warehouse}|${despachoK}`;
    const whData = D.smoked_wh[whKey];
    wh_total = overrideWh ?? (whData ? whData.total : 0);
    commission = (spNum - wh_total) * 0.02;
    const TARIFF_PCT = 0.1;
    const effectiveTariffPct = overrideTariff ?? TARIFF_PCT;
    tariff_pct_used = effectiveTariffPct;
    const tariff_base = Math.max(0, ((spNum - wh_total) * (1 - 0.02) / 0.4536 - (freight || 0)) * effectiveTariffPct * 0.4536 / (1 + effectiveTariffPct));
    tariff_auto = Math.max(0, tariff_base);
    tariff_val  = tariff_auto;
    total_ae = wh_total + commission + tariff_val;
  }

  const rmp = freight != null
    ? (sp_kg - (isUSA ? total_ae / 0.4536 : 0) - freight - gfob) * yield_
    : null;
  const retorno   = rmp != null ? rmp / yield_ : null;
  const fob_price = rmp != null ? rmp / yield_ + gfob : null;
  const firm_price = isUSA ? spNum - wh_total - commission - tariff_val : spNum;

  // RMP Mix — single byproduct from table
  let rmp_mix = null;
  if (rmp != null) {
    const pct = prod.pct_noobj || 0;
    if (pct > 0) {
      rmp_mix = rmp * (1 - pct) + prod.rmp_noobj * pct;
    } else {
      rmp_mix = rmp;
    }
  }

  // TDE — binary search: find USD/lb SP of TrimD Normal USA Mia that gives same RMP
  let tde = null;
  const tdeRef = D.tde_base[region];
  if (tdeRef && rmp != null) {
    const { yield_: ty, gfob: tg, freight: tf, wh: twh, comm_rate: tcr, tariff_pct: ttp } = tdeRef;
    let lo = 0.01, hi = 60.0;
    for (let i = 0; i < 80; i++) {
      const mid = (lo + hi) / 2;
      const tcomm_m = (mid - twh) * tcr;
      const ttariff_m = Math.max(0, ((mid - twh) * (1 - tcr) / 0.4536 - tf) * ttp * 0.4536 / (1 + ttp));
      const rmp_m = (mid / 0.4536 - (twh + tcomm_m + ttariff_m) / 0.4536 - tf - tg) * ty;
      if (rmp_m < rmp) lo = mid; else hi = mid;
    }
    tde = (lo + hi) / 2;
  }

  return {
    yield_, gfob, cv, ce, cf, cf_wfe, frig, exp,
    fleteUnit: effectiveFleteUnit, freight, mercado, isUSA,
    sp_kg, wh_total, commission, tariff_val, tariff_auto, tariff_pct_used, total_ae,
    rmp, rmp_mix, retorno, fob_price, firm_price, tde,
    subprod: prod.subprod, pct_noobj: prod.pct_noobj, rmp_noobj: prod.rmp_noobj,
  };
}


function calcPortions(form, overrideFleteUnit = null, cantCajas = 500, overrideWh = null, overrideTariff = null) {
  const { region, condicion, porcion, mmpp, destino, despacho, warehouse, sp, cubicacion } = form;
  const despachoK = despachoKey(despacho);
  const portKey = `${region}|${condicion}|${porcion}|${mmpp}`;
  const prod = D.portions[portKey];
  if (!prod) return null;

  const yield_ = prod.yield_ || 0;
  const cv     = prod.cv || 0;
  const cf_wfe = prod.cf || 0;
  const cf     = yield_ > 0 ? cf_wfe / yield_ : 0;
  const ce     = prod.ce || 0;
  const frig   = prod.frig || 0;
  const exp    = prod.exp || 0;

  const gfob = cv + ce + cf + exp + frig;

  // Freight
  const fleteKey  = `${region}|${despachoK}|${destino}`;
  const fleteData = D.fletes[fleteKey];
  const fleteUnit = fleteData ? fleteData.flete : null;
  let effectiveFleteUnit = overrideFleteUnit ?? fleteUnit;
  let freight = null;
  if (effectiveFleteUnit != null) {
    if (despachoK === "Aéreo") {
      freight = effectiveFleteUnit;
    } else if (despachoK === "Marítimo") {
      const cub = parseFloat(cubicacion) || 16000;
      freight = effectiveFleteUnit / cub;
    } else {
      freight = effectiveFleteUnit;
    }
  }

  // SP
  const mercado = getMercadoFromDestino(destino);
  const isUSA   = mercado === "USA";
  const spNum   = parseFloat(String(sp).replace(",", "."));
  if (isNaN(spNum) || spNum <= 0) return { yield_, gfob, fleteUnit: effectiveFleteUnit, mercado, isUSA, sp_kg: null };
  const sp_kg = isUSA ? spNum / 0.4536 : spNum;

  // USA costs
  let wh_total = 0, commission = 0, tariff_val = 0, total_ae = 0, tariff_auto = 0, tariff_pct_used = 0;
  if (isUSA) {
    const whKey = `${condicion}|${warehouse}|${despachoK}`;
    const whData = D.wh[whKey];
    const overrideWhParsed = overrideWh != null ? overrideWh : null;
    wh_total = overrideWhParsed ?? (whData ? whData.total : 0);
    commission = (spNum - wh_total) * 0.02;
    const TARIFF_PCT = 0.1;
    const effectiveTariffPct = overrideTariff ?? TARIFF_PCT;
    tariff_pct_used = effectiveTariffPct;
    const tariff_base = Math.max(0, ((spNum - wh_total) * (1 - 0.02) / 0.4536 - (freight || 0)) * effectiveTariffPct * 0.4536 / (1 + effectiveTariffPct));
    tariff_auto = Math.max(0, tariff_base);
    tariff_val  = tariff_auto;
    total_ae = wh_total + commission + tariff_val;
  }

  const rmp = freight != null
    ? (sp_kg - (isUSA ? total_ae / 0.4536 : 0) - freight - gfob) * yield_
    : null;
  const retorno = rmp != null ? rmp / yield_ : null;
  const fob_price = rmp != null ? rmp / yield_ + gfob : null;
  const firm_price = isUSA ? spNum - wh_total - commission - tariff_val : spNum;

  // RMP Mix
  let rmp_mix = null;
  if (rmp != null) {
    const { pct_obj, pct_noobj, pct_noobj2, pct_cola, pct_trozo, pct_belly,
            rmp_noobj, rmp_noobj2: rmp_noobj2v, rmp_cola, rmp_trozo, rmp_belly } = prod;
    const total_pct = pct_obj + pct_noobj + pct_noobj2 + pct_cola + pct_trozo + pct_belly;
    if (total_pct > 0) {
      rmp_mix = rmp * pct_obj
              + (rmp_noobj  || 0) * pct_noobj
              + (rmp_noobj2v || 0) * pct_noobj2
              + (rmp_cola   || 0) * pct_cola
              + (rmp_trozo  || 0) * pct_trozo
              + (rmp_belly  || 0) * pct_belly;
    } else {
      rmp_mix = rmp; // no byproduct data
    }
  }

  // TDE — binary search: find USD/lb SP of TrimD Normal USA Mia that gives same RMP
  let tde = null;
  const tdeRef = D.tde_base[region];
  if (tdeRef && rmp != null) {
    const { yield_: ty, gfob: tg, freight: tf, wh: twh, comm_rate: tcr, tariff_pct: ttp } = tdeRef;
    let lo = 0.01, hi = 60.0;
    for (let i = 0; i < 80; i++) {
      const mid = (lo + hi) / 2;
      const tcomm_m = (mid - twh) * tcr;
      const ttariff_m = Math.max(0, ((mid - twh) * (1 - tcr) / 0.4536 - tf) * ttp * 0.4536 / (1 + ttp));
      const rmp_m = (mid / 0.4536 - (twh + tcomm_m + ttariff_m) / 0.4536 - tf - tg) * ty;
      if (rmp_m < rmp) lo = mid; else hi = mid;
    }
    tde = (lo + hi) / 2;
  }

  return {
    yield_, gfob, cv, ce, cf, cf_wfe, frig, exp,
    fleteUnit: effectiveFleteUnit, freight, mercado, isUSA,
    sp_kg, wh_total, commission, tariff_val, tariff_auto, tariff_pct_used, total_ae,
    rmp, rmp_mix, retorno, fob_price, firm_price, tde,
  };
}

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────
function despachoKey(d) {
  if (d === "Air")      return "Aéreo";
  if (d === "Maritime") return "Marítimo";
  if (d === "Land")     return "Terrestre";
  return d;
}

function calcAll(form, overrideFleteUnit = null, cantCajas = 500, overrideTara = null, overrideWh = null, overrideTariff = null) {
  const { region, condicion, producto, pack, destino, despacho, warehouse, sp, cubicacion } = form;
  const despachoK = despachoKey(despacho);

  // Product params
  const prodKey = `${region}|${condicion}|${producto}`;
  const prod = D.products[prodKey];
  if (!prod) return null;

  const famPack = prod.FamiliaPack || "";
  const yield_base = prod.yield_ || 0;
  const gwKey = `${region}|${famPack}|${pack}`;
  const giveaway = GW_DATA[gwKey] || 1.0;
  const yield_ = yield_base * giveaway;
  const cv = prod.cv || 0;
  const cf_wfe = prod.cf || 0;
  const cf = yield_ > 0 ? cf_wfe / yield_ : 0;  // CF per kg PT
  const frig = prod.frig || 0;
  // ExPlanta dinámica según cajas (solo para HON China SP / HON China / HON China DUM)
  const prodKeyForCajas = `${region}|${condicion}|${producto}`;
  let exp;
  const cajas = parseFloat(cantCajas) || 500;
  // Peso por caja según pack
  const kgPorCaja = pack.includes("5-6") ? 22 : 20;
  if (prodKeyForCajas === "X Region|Fresh|HON China SP") {
    exp = 1921 / (cajas * kgPorCaja) + 0.09;
  } else if (prodKeyForCajas === "XII Region|Fresh|HON China" || prodKeyForCajas === "XII Region|Fresh|HON China DUM") {
    exp = 4400 / (cajas * kgPorCaja);
  } else if (region === "XII Region" && despacho === "Air" && getMercadoFromDestino(destino) === "USA") {
    // ExPlanta XII Region USA Aéreo — dinámico por destino (vía Ezeiza o Natales)
    if (destino === "Usa-Mia (aéreo)") {
      exp = 4752 / 15000;                   // 0.3168 — vía Ezeiza
    } else if (destino === "Usa-LAX (aéreo)" || destino === "Usa-JFK (aéreo)") {
      exp = (903000 / 900) / 6000;          // 0.16722 — depende del dólar (900)
    } else if (condicion === "Frozen") {
      exp = prod.exp || 0;                  // tabla (0.23972 para Frozen XII)
    } else {
      exp = prod.exp || 0;                  // Fresh XII = 0 para otros destinos USA
    }
  } else {
    exp = prod.exp || 0;
  }

  // CE lookup
  const ceKey = `${region}|${famPack}|${pack}`;
  const ce = D.ce[ceKey] ?? null;

  // GFOB (all per kg PT)
  const gfob = ce != null ? cv + ce + cf + exp + frig : null;

  // Freight
  const fleteKey = `${region}|${despachoK}|${destino}`;
  const fleteData = D.fletes[fleteKey];
  const fleteUnit = fleteData ? fleteData.flete : null;
  const taraKey = `${condicion}|${pack}`;
  const tara = overrideTara !== null ? overrideTara : (D.taras[taraKey] ?? 1.0);

  // Override fleteUnit if manual mode active, then recalculate freight
  const effectiveFleteUnit = (overrideFleteUnit !== null) ? overrideFleteUnit : fleteUnit;

  let freight = null;
  if (effectiveFleteUnit != null) {
    if (despachoK === "Aéreo") {
      freight = effectiveFleteUnit * tara;
    } else if (despachoK === "Marítimo") {
      const cub = parseFloat(cubicacion);
      freight = cub > 0 ? (effectiveFleteUnit / cub) * tara : null;
    } else {
      freight = 0;
    }
  }

  // Market
  const mercado = getMercadoFromDestino(destino);
  const isUSA = mercado === "USA";
  const spNum = parseFloat(sp);
  if (isNaN(spNum) || spNum <= 0) return { yield_, cv, ce, cf, cf_wfe, frig, exp, gfob, fleteUnit: effectiveFleteUnit, tara, freight, mercado, isUSA, sp_kg: null, gfob_full: gfob };

  // Sales Price [USD/kg PT]
  const sp_kg = isUSA ? spNum / 0.4536 : spNum;

  // Warehouse, commission, tariff (USA only)
  let wh_total = 0, commission = 0, tariff_val = 0, total_ae = 0, tariff_auto = 0, tariff_pct_used = 0;
  if (isUSA) {
    const whKey = `${condicion}|${warehouse}|${despachoK}`;
    wh_total = overrideWh !== null ? overrideWh : ((D.wh[whKey] && warehouse) ? D.wh[whKey].total : 0);
    commission = (spNum - wh_total) * COMM_RATE;
    const effectiveTariffPct = overrideTariff !== null ? overrideTariff : TARIFF_PCT;
    const tariff_base = effectiveTariffPct > 0 ? ((spNum - wh_total) * (1 - COMM_RATE) / 0.4536 - (freight || 0)) * effectiveTariffPct * 0.4536 / (1 + effectiveTariffPct) : 0;
    tariff_auto = Math.max(0, tariff_base);
    tariff_val = tariff_auto;
    tariff_pct_used = effectiveTariffPct;
    total_ae = wh_total + commission + tariff_val;
  }

  // RMP
  const rmp = gfob != null && freight != null
    ? (sp_kg - (isUSA ? total_ae / 0.4536 : 0) - freight - gfob) * yield_
    : null;

  // FOB Price & Firm Price
  const fob_price = rmp != null ? rmp / yield_ + gfob : null;
  const firm_price = isUSA ? spNum - wh_total - commission - tariff_val : spNum;
  const retorno = rmp != null ? rmp / yield_ : null;

  // TDE — binary search: find USD/lb SP of TrimD Normal USA Mia that gives same RMP
  let tde = null;
  const tdeRef = D.tde_base[region];
  if (tdeRef && rmp != null) {
    const { yield_: ty, gfob: tg, freight: tf, wh: twh, comm_rate: tcr, tariff_pct: ttp } = tdeRef;
    let lo = 0.01, hi = 60.0;
    for (let i = 0; i < 80; i++) {
      const mid = (lo + hi) / 2;
      const tcomm_m = (mid - twh) * tcr;
      const ttariff_m = Math.max(0, ((mid - twh) * (1 - tcr) / 0.4536 - tf) * ttp * 0.4536 / (1 + ttp));
      const rmp_m = (mid / 0.4536 - (twh + tcomm_m + ttariff_m) / 0.4536 - tf - tg) * ty;
      if (rmp_m < rmp) lo = mid; else hi = mid;
    }
    tde = (lo + hi) / 2;
  }

  return {
    yield_, yield_base, giveaway, cv, ce, cf, cf_wfe, frig, exp, gfob,
    fleteUnit: effectiveFleteUnit, tara, freight,
    mercado, isUSA,
    sp_kg, wh_total, commission, tariff_val, tariff_auto, tariff_pct_used, total_ae,
    rmp, tde, fob_price, firm_price, retorno, retorno_neto: retorno,
    famPack, ceKey, prodKey, fleteKey,
  };
}

// Input con estado local — definido FUERA de App para que React no lo desmonte en cada render
function LocalInput({ externalValue, onCommit, placeholder, inputStyle: iStyle }) {
  const [val, setVal] = React.useState(externalValue || "");
  React.useEffect(() => { setVal(externalValue || ""); }, [externalValue]);
  const normalize = (v) => v.replace(",", ".");
  const handleChange = (e) => {
    // Only update local display — no commit on every keystroke
    setVal(e.target.value);
  };
  const handleBlur = (e) => {
    const norm = normalize(e.target.value);
    setVal(norm);
    onCommit(norm);
  };
  return (
    <input
      type="text" inputMode="decimal"
      value={val}
      onChange={handleChange}
      onBlur={handleBlur}
      onKeyDown={e => { if (e.key === "Enter") e.target.blur(); }}
      placeholder={placeholder}
      style={iStyle}
    />
  );
}

function findSpForRmp(form, targetRmp) {
  // Binary search SP such that calcAll gives targetRmp
  let lo = 0.01, hi = 200.0;
  for (let i = 0; i < 100; i++) {
    const mid = (lo + hi) / 2;
    const c = calcAll({ ...form, sp: String(mid) });
    if (!c || c.rmp == null) return null;
    if (c.rmp < targetRmp) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

function findSpForTde(form, targetTde) {
  // Binary search SP such that calcAll gives targetTde
  let lo = 0.01, hi = 200.0;
  for (let i = 0; i < 100; i++) {
    const mid = (lo + hi) / 2;
    const c = calcAll({ ...form, sp: String(mid) });
    if (!c || c.tde == null) return null;
    if (c.tde < targetTde) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

    const trf = tariffManual.active && tariffManual.value !== "" ? parseFloat(tariffManual.value) / 100 : null;
    return calcPortions(form, fl, parseFloat(cantCajas) || 500, wh, trf);
  }, [form, fleteManual, cantCajas, whManual, tariffManual]);

    const warehouseDefault = useMemo(() => {
    const allowed = DEST_WH[form.destino];
    return allowed ? allowed[0] : null;
  }, [form.destino]);

  // ── AUTO-FILL when only one option available ──────────────────────────────
  useEffect(() => { if (famProductos.length === 1 && !form.famProducto) setForm(p => ({ ...p, famProducto: famProductos[0] })); }, [famProductos]);
  useEffect(() => { if (productos.length === 1 && !form.producto)       setForm(p => ({ ...p, producto: productos[0] })); }, [productos]);
  useEffect(() => { if (packs.length === 1 && !form.pack) {
    const prod = D.products[`${form.region}|${form.condicion}|${form.producto}`];
    const pack = packs[0];
    setForm(p => {
      const n = { ...p, pack };
      if (prod && p.condicion === "Frozen") {
        const cubKey = `${prod.FamiliaPack}|${pack}`;
        const defaultCub = CUB_DEFAULTS[cubKey];
        if (defaultCub) n.cubicacion = String(defaultCub);
      }
      return n;
    });
  }}, [packs]);
  useEffect(() => { if (paises.length === 1 && !form.pais)   setForm(p => ({ ...p, pais: paises[0], destino: "", warehouse: "" })); }, [paises]);
  useEffect(() => { if (destinos.length === 1 && !form.destino) setForm(p => ({ ...p, destino: destinos[0] })); }, [destinos]);
  // Auto-select warehouse: default from DEST_WH map, or only option
  // Auto-select smoked family/prod when only one option
  // Auto-fill cubicacion from smoked product (uses standard famProducto + producto)
  useEffect(() => {
    if (form.condicion !== "Smoked" || !form.producto || !form.famProducto) return;
    const key = `${form.region}|${form.famProducto}|${form.producto}`;
    const prod = D.smoked[key];
    if (prod && prod.cub > 0) setForm(p => ({ ...p, cubicacion: String(prod.cub) }));
  }, [form.condicion, form.famProducto, form.producto]);

  useEffect(() => {
    if (!form.destino || getMercadoFromDestino(form.destino) !== "USA") return;
    if (form.warehouse) return; // don't override manual selection
    const def = warehouseDefault;
    if (def && warehouses.includes(def)) {
      setForm(p => ({ ...p, warehouse: def }));
    } else if (warehouses.length === 1) {
      setForm(p => ({ ...p, warehouse: warehouses[0] }));
    }
  }, [form.destino, warehouses, warehouseDefault]);

  // ── SWITCH REGION ─────────────────────────────────────────────────────────
  const otherRegion = form.region === "X Region" ? "XII Region" : "X Region";
  const canSwitchRegion = useMemo(() => {
    if (!form.region || !form.condicion || !form.producto || !form.pack) return false;
    // Check product exists in other region
    const prodKey = `${otherRegion}|${form.condicion}|${form.producto}`;
    const prod = D.products[prodKey];
    if (!prod) return false;
    // Check pack (CE) exists in other region
    const ceKey = `${otherRegion}|${prod.FamiliaPack}|${form.pack}`;
    return D.ce[ceKey] != null;
  }, [form.region, form.condicion, form.producto, form.pack]);

  const switchRegion = () => {
    if (!canSwitchRegion) return;
    setForm(p => ({ ...p, region: otherRegion }));
  };

  const cajasParsed = parseFloat(cantCajas) || 500;
  const taraParsed = taraManual.active && taraManual.value !== "" ? parseFloat(taraManual.value) : null;
  const whParsed = whManual.active && whManual.value !== "" ? parseFloat(whManual.value) : null;
  const tariffParsed = tariffManual.active && tariffManual.value !== "" ? parseFloat(tariffManual.value) / 100 : null;
  const calc = useMemo(() => {
    const fl = fleteManual.active && fleteManual.value !== "" ? parseFloat(fleteManual.value) : null;
    return calcAll(form, fl, cajasParsed, taraParsed, whParsed, tariffParsed);
  }, [form, fleteManual, cajasParsed, taraParsed, whParsed, tariffParsed]);
  // Base calc without overrides (for showing auto values)
  const calcBase = useMemo(() => calcAll(form, null, cajasParsed, null, null), [form, cajasParsed]);
  const activeCalc = form.famProducto === "Portions" ? calcP : form.condicion === "Smoked" ? calcS : calc;
  const mercado = activeCalc ? activeCalc.mercado : getMercadoFromDestino(form.destino);
  const isUSA = mercado === "USA";

  const ready = activeCalc && activeCalc.rmp != null;

  // Styles
  const s = {
    bg: "#070b14", card: "rgba(255,255,255,.028)", border: "rgba(255,255,255,.07)",
    accent: "#00cfff", gold: "#f59e0b", green: "#10b981", red: "#ef4444",
    muted: "#3d5a7a", label: "#6a8fad", text: "#c8d8ea", bright: "#e8f2ff",
  };

  const selStyle = {
    background: "#0d1526", border: `1px solid ${s.border}`, borderRadius: 7,
    color: s.text, padding: "8px 10px", fontSize: 12, width: "100%", outline: "none",
    fontFamily: "inherit", cursor: "pointer",
  };
  const inputStyle = { ...selStyle, fontFamily: "'JetBrains Mono', monospace", color: s.bright };
  const lockedStyle = { ...selStyle, background: "rgba(0,0,0,.25)", color: s.muted, cursor: "default", borderStyle: "dashed" };

  const Label = ({ children }) => (
    <div style={{ fontSize: 9, color: s.label, textTransform: "uppercase", letterSpacing: "1.2px", marginBottom: 4, fontWeight: 600 }}>{children}</div>
  );
  const Field = ({ label, children, span }) => (
    <div style={{ gridColumn: span ? `span ${span}` : undefined }}>
      <Label>{label}</Label>
      {children}
    </div>
  );
  const Locked = ({ value, unit }) => (
    <div style={{ ...lockedStyle, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>{value ?? "—"}</span>
      {unit && <span style={{ fontSize: 10, color: s.muted }}>{unit}</span>}
    </div>
  );

    const SectionHead = ({ children, color }) => (
    <div style={{ gridColumn: "1 / -1", borderBottom: `1px solid ${color || s.accent}22`, paddingBottom: 6, marginBottom: 2 }}>
      <span style={{ fontSize: 10, fontWeight: 700, color: color || s.accent, letterSpacing: "2px", textTransform: "uppercase" }}>{children}</span>
    </div>
  );

  const ResultRow = ({ label, value, unit, color, size, bold }) => (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${s.border}` }}>
      <span style={{ fontSize: 11, color: s.label }}>{label}</span>
      <div style={{ textAlign: "right" }}>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: size || 12, fontWeight: bold ? 700 : 400, color: color || s.text }}>{value}</span>
        {unit && <span style={{ fontSize: 9, color: s.muted, marginLeft: 4 }}>{unit}</span>}
      </div>
    </div>
  );

  const grid = { display: "grid", gap: 10 };

  return (
    <div style={{ fontFamily: "'Outfit', 'Syne', sans-serif", background: s.bg, minHeight: "100vh", color: s.text }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        select option { background: #0d1526; }
        select:focus, input:focus { border-color: rgba(0,207,255,.4) !important; box-shadow: 0 0 0 2px rgba(0,207,255,.08); }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #1a2d4a; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(4px) } to { opacity:1; transform:none } }
        .result-in { animation: fadeIn .3s ease forwards; }
      `}</style>

      {/* Header */}
      <div style={{ background: "rgba(0,207,255,.04)", borderBottom: `1px solid rgba(0,207,255,.12)`, padding: "14px 28px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ width: 3, height: 32, background: "linear-gradient(to bottom, #00cfff, #0057ff)", borderRadius: 2 }} />
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#fff", letterSpacing: "-0.5px" }}>Retorno <span style={{ color: s.accent }}>Materia Prima</span> · HON Fillets</div>
            <div style={{ fontSize: 11, color: s.muted, marginTop: 1 }}>Calculadora de Retorno Materia Prima</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>

          <button onClick={() => { setFavsOpen(o => !o); setSaveMode(false); }} style={{
            background: favsOpen ? "rgba(250,204,21,.12)" : "rgba(255,255,255,.05)",
            border: `1px solid ${favsOpen ? "rgba(250,204,21,.5)" : s.border}`,
            borderRadius: 6, padding: "4px 12px", color: favsOpen ? "#facc15" : s.muted,
            cursor: "pointer", fontSize: 13, fontWeight: 600, fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5
          }}>
            ☆ <span style={{ fontSize: 11 }}>Favorites{favs.length > 0 ? ` (${favs.length})` : ""}</span>
          </button>
        </div>
      </div>

      {/* Favorites Panel */}
      {favsOpen && (
        <div style={{ background: "rgba(250,204,21,.04)", borderBottom: "1px solid rgba(250,204,21,.15)", padding: "16px 28px" }}>
          <div style={{ maxWidth: 1060, margin: "0 auto" }}>
            {/* Header row */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#facc15", letterSpacing: "2px", textTransform: "uppercase" }}>
                ☆ Saved Favorites
              </div>
              {compareIds.length === 2 && (
                <button onClick={() => setCompareIds([])} style={{
                  padding: "4px 12px", background: "rgba(99,102,241,.15)", border: "1px solid rgba(99,102,241,.4)",
                  borderRadius: 6, color: "#818cf8", cursor: "pointer", fontSize: 11, fontWeight: 600, fontFamily: "inherit"
                }}>✕ Clear comparison</button>
              )}
              {compareIds.length === 1 && (
                <div style={{ fontSize: 11, color: s.muted, fontStyle: "italic" }}>Select one more to compare</div>
              )}
            </div>

            {favs.length === 0 && (
              <div style={{ fontSize: 12, color: s.muted, fontStyle: "italic" }}>
                No favorites saved yet. Fill in the form and click "＋ Save" to add one.
              </div>
            )}

            {/* Cards */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: compareIds.length === 2 ? 20 : 0 }}>
              {favs.map(fav => {
                const sel = compareIds.includes(fav.id);
                const selIdx = compareIds.indexOf(fav.id);
                return (
                  <div key={fav.id} style={{
                    background: sel ? "rgba(99,102,241,.1)" : "rgba(255,255,255,.04)",
                    border: `1px solid ${sel ? "rgba(99,102,241,.5)" : "rgba(250,204,21,.2)"}`,
                    borderRadius: 8, padding: "8px 12px", display: "flex", alignItems: "center", gap: 10, minWidth: 220,
                    transition: "border .15s, background .15s"
                  }}>
                    {/* Compare toggle */}
                    <button onClick={() => toggleCompare(fav.id)} title="Select for comparison" style={{
                      width: 22, height: 22, borderRadius: 5, flexShrink: 0, cursor: "pointer", fontFamily: "inherit",
                      background: sel ? "rgba(99,102,241,.3)" : "rgba(255,255,255,.06)",
                      border: `1px solid ${sel ? "rgba(99,102,241,.7)" : "rgba(255,255,255,.15)"}`,
                      color: sel ? "#a5b4fc" : s.muted, fontSize: 10, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center"
                    }}>{sel ? selIdx + 1 : "⊞"}</button>
                    {/* Info — click to load */}
                    <div style={{ flex: 1, cursor: "pointer" }} onClick={() => loadFav(fav)}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: sel ? "#a5b4fc" : "#facc15" }}>{fav.name}</div>
                      <div style={{ fontSize: 10, color: s.muted, marginTop: 2 }}>
                        {[fav.form.region, fav.form.producto, fav.form.pack, fav.form.destino].filter(Boolean).join(" · ")}
                      </div>
                      {fav.form.sp && <div style={{ fontSize: 10, color: s.accent, marginTop: 1 }}>SP {fav.form.sp}</div>}
                    </div>
                    <button onClick={() => deleteFav(fav.id)} style={{
                      background: "none", border: "none", color: "rgba(239,68,68,.5)", cursor: "pointer", fontSize: 14, padding: 2,
                      lineHeight: 1, flexShrink: 0
                    }} title="Delete">✕</button>
                  </div>
                );
              })}
            </div>

            {/* Comparison table */}
            {compareIds.length === 2 && (() => {
              const [a, b] = compareIds.map(id => favs.find(f => f.id === id));
              if (!a || !b) return null;
              const calcFav = (fav, spOverride) => {
                const fl  = fav.fleteManual?.active  && fav.fleteManual.value  !== "" ? parseFloat(fav.fleteManual.value)  : null;
                const tr  = fav.taraManual?.active   && fav.taraManual.value   !== "" ? parseFloat(fav.taraManual.value)   : null;
                const wh  = fav.whManual?.active     && fav.whManual.value     !== "" ? parseFloat(fav.whManual.value)     : null;
                const trf = fav.tariffManual?.active && fav.tariffManual.value !== "" ? parseFloat(fav.tariffManual.value) / 100 : null;
                const formOverride = spOverride != null && !isNaN(parseFloat(spOverride))
                  ? { ...fav.form, sp: String(spOverride) } : fav.form;
                return calcAll(formOverride, fl, parseFloat(fav.cantCajas) || 500, tr, wh, trf);
              };
              const spAval = cmpSpA !== "" && !isNaN(parseFloat(cmpSpA)) ? parseFloat(cmpSpA) : null;
              const spBval = cmpSpB !== "" && !isNaN(parseFloat(cmpSpB)) ? parseFloat(cmpSpB) : null;
              const ca = calcFav(a, spAval), cb = calcFav(b, spBval);
              if (!ca || !cb) return <div style={{ fontSize: 12, color: s.muted }}>One or more favorites have incomplete data.</div>;

              const fmt = (v, d=4) => v != null && isFinite(v) ? v.toFixed(d) : "—";
              const fmtPct = (v) => v != null && isFinite(v) ? (v * 100).toFixed(2) + " %" : "—";
              const deltaYield = (va, vb) => {
                if (va == null || vb == null || !isFinite(va) || !isFinite(vb)) return { txt: "—", pos: null };
                const d_ = (va - vb) * 100;
                const pos = d_ > 0.001 ? true : d_ < -0.001 ? false : null;
                return { txt: (pos === true ? "+" : "") + d_.toFixed(2) + " %", pos };
              };
              const delta = (va, vb, d=4) => {
                if (va == null || vb == null || !isFinite(va) || !isFinite(vb)) return { txt: "—", pos: null };
                const d_ = va - vb;
                const pos = d_ > 0.0001 ? true : d_ < -0.0001 ? false : null;
                return { txt: (pos === true ? "+" : "") + d_.toFixed(d), pos };
              };
              const deltaColor = (pos) => pos === true ? "#4ade80" : pos === false ? "#f87171" : s.muted;

              const colA = { fontSize: 12, fontFamily: "'JetBrains Mono', monospace", textAlign: "right", color: "#a5b4fc", fontWeight: 600 };
              const colB = { ...colA, color: "#67e8f9" };
              const colD = (pos) => ({ ...colA, color: deltaColor(pos), fontWeight: 700 });
              const lbl  = { fontSize: 11, color: s.label, paddingRight: 12 };
              const sep  = { borderTop: `1px solid ${s.border}` };
              const bigA = { ...colA, fontSize: 15, fontWeight: 700 };
              const bigB = { ...colB, fontSize: 15, fontWeight: 700 };

              // All values × yield → USD/kg WFE for apples-to-apples comparison
              const wfe = (v, y) => v != null && y != null ? v * y : null;
              // For USA vs non-USA: non-USA side shows 0 so delta reflects the full cost difference
              const usaVal = (c, v) => c.isUSA ? v : 0;
              const showUSA = ca.isUSA || cb.isUSA;
              const pct = (v) => v != null ? (v * 100).toFixed(2) + " %" : "—";
              const rows = [
                { label: "Yield",        vA: ca.yield_,  vB: cb.yield_,  unit: "", isPct: true, d: 4 },
                { label: "SP",           vA: wfe(ca.sp_kg, ca.yield_),  vB: wfe(cb.sp_kg, cb.yield_),  unit: "USD/kg WFE" },
                ...(showUSA ? [{
                  label: "− USA Costs", bold: true, sep: true, collapsible: true,
                  vA: wfe(-usaVal(ca, ca.total_ae/0.4536), ca.yield_),
                  vB: wfe(-usaVal(cb, cb.total_ae/0.4536), cb.yield_),
                  unit: "USD/kg WFE",
                }] : []),
                ...(showUSA && usaExpanded ? [
                  { label: "  · WH Cost",    indent: true, vA: wfe(-usaVal(ca, ca.wh_total/0.4536),   ca.yield_), vB: wfe(-usaVal(cb, cb.wh_total/0.4536),   cb.yield_), unit: "USD/kg WFE" },
                  { label: "  · Commission", indent: true, vA: wfe(-usaVal(ca, ca.commission/0.4536), ca.yield_), vB: wfe(-usaVal(cb, cb.commission/0.4536), cb.yield_), unit: "USD/kg WFE" },
                  { label: "  · Tariff",     indent: true, vA: wfe(-usaVal(ca, ca.tariff_val/0.4536), ca.yield_), vB: wfe(-usaVal(cb, cb.tariff_val/0.4536), cb.yield_), unit: "USD/kg WFE" },
                ] : []),
                { label: "− Freight",    vA: wfe(-ca.freight, ca.yield_),   vB: wfe(-cb.freight, cb.yield_),   unit: "USD/kg WFE", sep: true },
                { label: "FOB Price",    vA: wfe(ca.fob_price, ca.yield_),  vB: wfe(cb.fob_price, cb.yield_),  unit: "USD/kg WFE", bold: true, sep: true },
                { label: "− GFOB", bold: true, collapsibleGfob: true,
                  vA: wfe(-ca.gfob, ca.yield_), vB: wfe(-cb.gfob, cb.yield_), unit: "USD/kg WFE" },
                ...(gfobExpanded ? [
                  { label: "  · CV",         indent: true, vA: wfe(-ca.cv,     ca.yield_), vB: wfe(-cb.cv,     cb.yield_), unit: "USD/kg WFE" },
                  { label: "  · CE",         indent: true, vA: wfe(-ca.ce,     ca.yield_), vB: wfe(-cb.ce,     cb.yield_), unit: "USD/kg WFE" },
                  { label: "  · CF/kg PT",   indent: true, vA: wfe(-ca.cf,     ca.yield_), vB: wfe(-cb.cf,     cb.yield_), unit: "USD/kg WFE" },
                  { label: "  · ExPlanta",   indent: true, vA: wfe(-ca.exp,    ca.yield_), vB: wfe(-cb.exp,    cb.yield_), unit: "USD/kg WFE" },
                  { label: "  · Cold Store", indent: true, vA: wfe(-ca.frig,   ca.yield_), vB: wfe(-cb.frig,   cb.yield_), unit: "USD/kg WFE" },
                ] : []),
                { label: "RMP",          vA: ca.rmp,                        vB: cb.rmp,                        unit: "USD/kg WFE", big: true, sep: true },
                { label: "TDE",          vA: ca.tde,                        vB: cb.tde,                        unit: "USD/lb",     big: true, raw: true },
              ];

              return (
                <div style={{ background: "rgba(0,0,0,.3)", border: "1px solid rgba(99,102,241,.25)", borderRadius: 10, overflow: "hidden" }}>
                  {/* Table header */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 160px 160px 120px", background: "rgba(99,102,241,.1)", padding: "10px 16px", borderBottom: "1px solid rgba(99,102,241,.2)" }}>
                    <div style={{ fontSize: 10, color: s.muted, letterSpacing: "1.5px", textTransform: "uppercase" }}>Metric</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#a5b4fc", textAlign: "right" }}>① {a.name}</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#67e8f9", textAlign: "right" }}>② {b.name}</div>
                    <div style={{ fontSize: 10, color: s.muted, textAlign: "right", letterSpacing: "1.5px", textTransform: "uppercase" }}>Δ (①−②)</div>
                  </div>
                  {/* SP override inputs */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 160px 160px 120px", background: "rgba(0,0,0,.25)", padding: "8px 16px", borderBottom: `1px solid ${s.border}` }}>
                    <div style={{ fontSize: 9, color: s.muted, alignSelf: "center", letterSpacing: "1px", textTransform: "uppercase" }}>Simulate SP</div>
                    {[
                      { val: cmpSpA, set: setCmpSpA, col: "#a5b4fc", orig: a.form.sp, unit: ca?.isUSA ? "USD/lb" : "USD/kg" },
                      { val: cmpSpB, set: setCmpSpB, col: "#67e8f9", orig: b.form.sp, unit: cb?.isUSA ? "USD/lb" : "USD/kg" },
                    ].map(({ val, set, col, orig, unit }, i) => (
                      <div key={i} style={{ textAlign: "right" }}>
                        <input
                          type="text" inputMode="decimal"
                          value={val}
                          onChange={e => set(e.target.value)}
                          placeholder={orig || "—"}
                          style={{
                            width: 120, padding: "4px 8px", textAlign: "right",
                            background: val ? "rgba(99,102,241,.12)" : "rgba(255,255,255,.04)",
                            border: val ? `1px solid ${col}` : "1px solid rgba(255,255,255,.08)",
                            borderRadius: 6, color: val ? col : s.muted,
                            fontSize: 12, fontFamily: "'JetBrains Mono',monospace", outline: "none"
                          }}
                        />
                        <div style={{ fontSize: 9, color: s.muted, marginTop: 2 }}>{unit}</div>
                      </div>
                    ))}
                    <div style={{ textAlign: "right", alignSelf: "center" }}>
                      {(cmpSpA || cmpSpB) && (
                        <button onClick={() => { setCmpSpA(""); setCmpSpB(""); }}
                          style={{ fontSize: 10, padding: "3px 7px", background: "transparent", border: "1px solid rgba(255,255,255,.1)", borderRadius: 5, color: s.muted, cursor: "pointer" }}>
                          Reset
                        </button>
                      )}
                    </div>
                  </div>
                  {/* Rows */}
                  {rows.map((row, i) => {
                    if (row.vA == null && row.vB == null) return null;
                    const d = row.isPct ? deltaYield(row.vA, row.vB) : delta(row.vA, row.vB, row.d || 4);
                    const disp = (v) => v == null ? <span style={{ color: "rgba(255,255,255,.15)" }}>—</span> : row.isPct ? fmtPct(v) : fmt(v, row.d || 4);
                    const isCollapsible = row.collapsible;
                    const isCollapsibleGfob = row.collapsibleGfob;
                  return (
                      <div key={i} onClick={isCollapsible ? () => setUsaExpanded(x => !x) : isCollapsibleGfob ? () => setGfobExpanded(x => !x) : undefined}
                        style={{ display: "grid", gridTemplateColumns: "1fr 160px 160px 120px", padding: "7px 16px",
                          ...(row.sep ? sep : {}),
                          background: row.big ? "rgba(255,255,255,.03)" : row.indent ? "rgba(0,0,0,.15)" : "transparent",
                          cursor: (isCollapsible || isCollapsibleGfob) ? "pointer" : "default" }}>

                    <div style={{ fontSize: 9, color: s.muted, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 6 }}>RMP [USD/kg WFE]</div>
                    <div style={{ fontSize: 30, fontWeight: 700, color: calcP.rmp > 5 ? s.green : calcP.rmp > 2 ? s.gold : s.red, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1 }}>
                      {fmt(calcP.rmp, 3)}
                    </div>
                  </div>
                  <div style={{ background: "rgba(168,85,247,.06)", border: `1px solid rgba(168,85,247,.25)`, borderRadius: 10, padding: 14, textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: s.muted, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 6 }}>RMP Mix [USD/kg WFE]</div>
                    <div style={{ fontSize: 30, fontWeight: 700, color: "#a855f7", fontFamily: "'JetBrains Mono', monospace", lineHeight: 1 }}>
                      {fmt(calcP.rmp_mix, 3)}
                    </div>
                    <div style={{ fontSize: 9, color: s.muted, marginTop: 4 }}>
                      Δ {calcP.rmp_mix - calcP.rmp >= 0 ? "+" : ""}{fmt(calcP.rmp_mix - calcP.rmp, 3)}
                    </div>
                  </div>
                </div>
              ) : (
                <div style={{ background: ready ? "rgba(0,207,255,.06)" : "transparent", border: `1px solid rgba(0,207,255,.18)`, borderRadius: 10, padding: 16, marginBottom: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: s.muted, letterSpacing: "2px", textTransform: "uppercase", marginBottom: 8 }}>RMP [USD/kg WFE]</div>
                  {revMode !== "rmp" ? (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                      <div style={{ fontSize: 42, fontWeight: 700, color: activeCalc?.rmp > 5 ? s.green : activeCalc?.rmp > 2 ? s.gold : s.red, fontFamily: "'JetBrains Mono', monospace", lineHeight: 1 }}>
                        {fmt(activeCalc?.rmp, 3)}
                      </div>
                      {activeCalc?.rmp != null && (
                        <button onClick={() => { setRevMode("rmp"); setRevInput(""); }} style={{ padding: "3px 8px", fontSize: 11, background: "rgba(0,207,255,.12)", border: "1px solid rgba(0,207,255,.35)", borderRadius: 6, color: s.accent, cursor: "pointer", fontFamily: "inherit", alignSelf: "center" }}>✎</button>
                      )}
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "center" }}>
                      <div style={{ fontSize: 10, color: s.muted }}>Target RMP → calculates SP</div>
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <input autoFocus type="text" inputMode="decimal" value={revInput}
                          onChange={e => setRevInput(e.target.value)}
                          onKeyDown={e => {
                            if (e.key === "Enter") {
                              const t = parseFloat(revInput.replace(",","."));
                              if (!isNaN(t)) { const sp = findSpForRmp(form, t); if (sp != null) { set("sp", sp.toFixed(4)); } }
                              setRevMode(null);
                            }
                            if (e.key === "Escape") setRevMode(null);
                          }}
                          placeholder="e.g. 6.00"
                          style={{ width: 110, padding: "5px 10px", background: "rgba(0,207,255,.08)", border: "1px solid rgba(0,207,255,.5)", borderRadius: 6, color: "#fff", fontSize: 14, fontFamily: "'JetBrains Mono',monospace", outline: "none", textAlign: "center" }}
                        />
                        <button onClick={() => setRevMode(null)} style={{ padding: "3px 8px", fontSize: 11, background: "transparent", border: "1px solid rgba(255,255,255,.1)", borderRadius: 6, color: s.muted, cursor: "pointer" }}>✕</button>
                      </div>
                    </div>
                  )}
                  <div style={{ fontSize: 10, color: s.muted, marginTop: 6 }}>USD / kg WFE</div>
                </div>
              )}

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                <div style={{ background: "rgba(16,185,129,.06)", border: `1px solid rgba(16,185,129,.18)`, borderRadius: 10, padding: 12, textAlign: "center" }}>
                  <div style={{ fontSize: 9, color: s.muted, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 4 }}>Trim D Eq [USD/lb]</div>
                  {revMode !== "tde" ? (
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                      <div style={{ fontSize: 24, fontWeight: 700, color: s.green, fontFamily: "'JetBrains Mono', monospace" }}>
                        {fmt(activeCalc?.tde, 3)}
                      </div>
                      {activeCalc?.tde != null && (
                        <button onClick={() => { setRevMode("tde"); setRevInput(""); }} style={{ padding: "2px 7px", fontSize: 10, background: "rgba(16,185,129,.15)", border: "1px solid rgba(16,185,129,.4)", borderRadius: 5, color: s.green, cursor: "pointer", fontFamily: "inherit" }}>✎</button>
                      )}
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 5, alignItems: "center" }}>
                      <div style={{ fontSize: 9, color: s.muted }}>Target TDE → get SP</div>
                      <div style={{ display: "flex", gap: 4 }}>
                        <input autoFocus type="text" inputMode="decimal" value={revInput}
                          onChange={e => setRevInput(e.target.value)}
                          onKeyDown={e => {
                            if (e.key === "Enter") {
                              const t = parseFloat(revInput.replace(",","."));
                              if (!isNaN(t)) { const sp = findSpForTde(form, t); if (sp != null) { set("sp", sp.toFixed(4)); } }
                              setRevMode(null);
                            }
                            if (e.key === "Escape") setRevMode(null);
                          }}
                          placeholder="e.g. 6.50"
                          style={{ width: 80, padding: "4px 8px", background: "rgba(16,185,129,.08)", border: "1px solid rgba(16,185,129,.5)", borderRadius: 5, color: "#fff", fontSize: 13, fontFamily: "'JetBrains Mono',monospace", outline: "none", textAlign: "center" }}
                        />
                        <button onClick={() => setRevMode(null)} style={{ padding: "2px 6px", fontSize: 10, background: "transparent", border: "1px solid rgba(255,255,255,.1)", borderRadius: 5, color: s.muted, cursor: "pointer" }}>✕</button>
                      </div>
                    </div>
                  )}
                </div>
                <div style={{ background: "rgba(245,158,11,.06)", border: `1px solid rgba(245,158,11,.18)`, borderRadius: 10, padding: 12, textAlign: "center" }}>
                  <div style={{ fontSize: 9, color: s.muted, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 4 }}>Mercado</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: s.gold, fontFamily: "inherit", marginTop: 2 }}>
                    {mercado || "—"}
                  </div>
                </div>
              </div>

              {/* Breakdown */}
              {/* Save Favorite */}
              {calc && (
                <div style={{ marginBottom: 12 }}>
                  {!saveMode ? (
                    <button onClick={() => { setSaveMode(true); setSaveName(""); }} style={{
                      width: "100%", padding: "7px 0", background: "rgba(250,204,21,.08)",
                      border: "1px solid rgba(250,204,21,.3)", borderRadius: 7,
                      color: "#facc15", cursor: "pointer", fontSize: 11, fontWeight: 600,
                      fontFamily: "inherit", letterSpacing: "0.5px"
                    }}>☆ Save to Favorites</button>
                  ) : (
                    <div style={{ display: "flex", gap: 6 }}>
                      <input
                        autoFocus
                        type="text"
                        value={saveName}
                        onChange={e => setSaveName(e.target.value)}
                        onKeyDown={e => { if (e.key === "Enter") saveFav(); if (e.key === "Escape") setSaveMode(false); }}
                        placeholder="Name this favorite..."
                        style={{
                          flex: 1, padding: "6px 10px", background: "rgba(255,255,255,.05)",
                          border: "1px solid rgba(250,204,21,.4)", borderRadius: 7,
                          color: "#fff", fontSize: 11, fontFamily: "inherit", outline: "none"
                        }}
                      />
                      <button onClick={saveFav} style={{
                        padding: "6px 10px", background: "rgba(250,204,21,.15)",
                        border: "1px solid rgba(250,204,21,.5)", borderRadius: 7,
                        color: "#facc15", cursor: "pointer", fontSize: 12, fontWeight: 700, fontFamily: "inherit"
                      }}>＋</button>
                      <button onClick={() => setSaveMode(false)} style={{
                        padding: "6px 8px", background: "transparent",
                        border: "1px solid rgba(255,255,255,.1)", borderRadius: 7,
                        color: s.muted, cursor: "pointer", fontSize: 11, fontFamily: "inherit"
                      }}>✕</button>
                    </div>
                  )}
                </div>
              )}
              <div style={{ fontSize: 10, color: s.muted, textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 8, marginTop: 4 }}>Desglose</div>

              <ResultRow label="SP [USD/kg PT]" value={fmtC(activeCalc?.sp_kg, 4)} />
              {isUSA && <GastosUSARow calc={calc} s={s} fmt={fmt} ResultRow={ResultRow} />}
              <ResultRow label="− Freight" value={`− ${fmt(activeCalc?.freight, 5)}`} color={s.red} />
              <ResultRow label="= FOB Price [USD/kg PT]" value={fmtC(activeCalc?.fob_price, 5)} bold />
              <GFOBRow calc={activeCalc} s={s} fmt={fmt} ResultRow={ResultRow} />
              <ResultRow label="= Net Return [USD/kg PT]" value={fmtC(activeCalc?.retorno, 5)} bold />
              <ResultRow label="× Yield" value={`× ${(activeCalc?.yield_ * 100).toFixed(2)}%`} />
              <ResultRow label="= RMP [USD/kg WFE]" value={fmtC(activeCalc?.rmp, 4)} color={s.accent} bold size={14} />
              <div style={{ height: 1, background: s.border, margin: "8px 0" }} />
              <ResultRow label="FOB Price [USD/kg PT]" value={fmtC(activeCalc?.fob_price, 4)} />

              {isUSA && (
                <>
                  <ResultRow label="Firm Price [USD/lb]" value={fmtC(activeCalc?.firm_price, 4)} />
                  <ResultRow label="Commission" value={fmtC(activeCalc?.commission, 4)} />
                  <ResultRow label="Tariff [USD/lb]" value={fmtC(activeCalc?.tariff_val, 5)} />
                </>
              )}

              {/* Sensitivity table ±30c */}
              {(() => {
                const spBase = parseFloat(form.sp);
                if (!spBase || !activeCalc?.rmp) return null;
                const steps = [-0.30, -0.20, -0.10, 0, +0.10, +0.20, +0.30];
                const rows = steps.map(delta => {
                  const spAdj = spBase + delta;
                  const c = calcAll({ ...form, sp: String(spAdj) });
                  return { delta, sp: spAdj, rmp: c?.rmp, tde: c?.tde };
                });
                return (
                  <div style={{ marginTop: 14 }}>
                    <div style={{ fontSize: 10, color: s.muted, textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 6 }}>
                      Sensibilidad SP ± USD 0.30
                    </div>
                    <div style={{ borderRadius: 8, overflow: "hidden", border: `1px solid ${s.border}` }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
                        <thead>
                          <tr style={{ background: "rgba(255,255,255,.04)" }}>
                            <th style={{ padding: "5px 8px", color: s.muted, fontWeight: 500, textAlign: "right", borderBottom: `1px solid ${s.border}` }}>SP</th>
                            <th style={{ padding: "5px 8px", color: s.muted, fontWeight: 500, textAlign: "right", borderBottom: `1px solid ${s.border}` }}>RMP</th>
                            <th style={{ padding: "5px 8px", color: s.muted, fontWeight: 500, textAlign: "right", borderBottom: `1px solid ${s.border}` }}>Trim D Eq</th>
                          </tr>
                        </thead>
                        <tbody>
                          {rows.map(({ delta, sp, rmp, tde }) => {
                            const isBase = delta === 0;
                            const rowBg = isBase ? "rgba(0,207,255,.07)" : "transparent";
                            const rmpColor = rmp == null ? s.muted : rmp > 5 ? s.green : rmp > 2 ? s.gold : s.red;
                            return (
                              <tr key={delta} style={{ background: rowBg, borderBottom: `1px solid rgba(255,255,255,.03)` }}>
                                <td style={{ padding: "5px 8px", textAlign: "right", color: isBase ? s.accent : s.muted }}>
                                  {isBase ? "▶ " : (delta > 0 ? "+" : "")}{delta.toFixed(2) === "0.00" ? "" : (delta > 0 ? "+" : "") + delta.toFixed(2) + " → "}
                                  <span style={{ color: isBase ? s.accent : "#fff" }}>{sp.toFixed(2)}</span>
                                </td>
                                <td style={{ padding: "5px 8px", textAlign: "right", color: rmpColor, fontWeight: isBase ? 700 : 400 }}>
                                  {rmp != null ? rmp.toFixed(3) : "—"}
                                </td>
                                <td style={{ padding: "5px 8px", textAlign: "right", color: isBase ? s.green : s.muted, fontWeight: isBase ? 700 : 400 }}>
                                  {tde != null ? tde.toFixed(3) : "—"}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })()}

              {/* Formula reminder */}
              <div style={{ marginTop: 14, padding: 10, background: "rgba(0,0,0,.2)", borderRadius: 7, fontSize: 10, fontFamily: "'JetBrains Mono', monospace", color: s.muted, lineHeight: 1.7 }}>
                N = (M − AE/0.4536 − AB − S) × R
                <br /><span style={{ color: "#3d5a7a" }}>M=SP_kg · AE=GastosUSA · AB=Freight · S=GFOB · R=Yield</span>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));root.render(<App/>);</script></body></html>
